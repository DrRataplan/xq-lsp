name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    lint-pr-title:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      perf
                      docs
                      refactor
                      test
                      chore
                      ci
                  requireScope: false

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: npm
            - run: npm ci
            - run: npm run build
            - run: npm install --prefix editors/vscode
            - run: npm run test:coverage
              env:
                  QT4_TESTS_DIR: ${{ github.workspace }}/qt4tests
            - name: Upload coverage to Coveralls
              uses: coverallsapp/github-action@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    test-vscode-extension:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: npm
            - run: npm ci
            - run: npm run build
            - run: npm install --prefix editors/vscode
            - name: Build extension bundle
              run: node build.mjs
              working-directory: editors/vscode
            - name: Test grammar snapshots
              run: npm run test:grammar
              working-directory: editors/vscode
            - name: Cache VS Code download
              uses: actions/cache@v4
              with:
                  path: ~/.vscode-test
                  key: vscode-${{ runner.os }}-stable
            - name: Run VS Code E2E tests
              run: xvfb-run -a npm run test:e2e
              working-directory: editors/vscode

    publish-dry-run:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: npm
            - run: npm ci
            - run: npm run build
            - name: npm pack (validates package, creates tarball for vsce step)
              run: npm pack
            - name: Install extension deps, override xq-lsp with packed tarball
              working-directory: editors/vscode
              run: |
                  npm install
                  npm install ../../xq-lsp-*.tgz
            - name: vsce package dry-run
              run: npm run package
              working-directory: editors/vscode
