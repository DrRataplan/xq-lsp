name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            refactor
            test
            chore
            ci
          requireScope: false
