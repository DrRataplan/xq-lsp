name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    lint-pr-title:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      perf
                      docs
                      refactor
                      test
                      chore
                      ci
                  requireScope: false

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: npm
            - run: npm ci
            - name: Download QT4 test suite
              run: |
                  SHA=$(cat qt4-testset-commit.txt)
                  git clone --filter=blob:none --no-checkout https://github.com/qt4cg/qt4tests.git /tmp/qt4tests
                  cd /tmp/qt4tests && git checkout "$SHA"
            - run: npm run test:coverage
              env:
                  QT4_TESTS_DIR: /tmp/qt4tests
            - name: Upload coverage to Coveralls
              uses: coverallsapp/github-action@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
