<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xq-lsp — Autocomplete Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #1e1e1e;
      --panel:          #252526;
      --border:         #3e3e42;
      --text:           #d4d4d4;
      --muted:          #808080;
      --accent:         #0e639c;
      --selection:      #264f78;
      --dropdown-bg:    #252526;
      --dropdown-sel:   #04395e;
      --dropdown-hover: #2a2d2e;
      --fn-col:         #dcdcaa;
      --var-col:        #9cdcfe;
      --code-bg:        #1a1a2e;
      --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1    { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
    header .sep  { color: var(--border); }
    header .sub  { font-size: 13px; color: var(--muted); }

    /* ── Layout ───────────────────────────────────────────────────────────────── */
    main { flex: 1; display: flex; overflow: hidden; }

    /* ── Editor pane ──────────────────────────────────────────────────────────── */
    .editor-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .tab-bar {
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
    }
    .tab {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 16px;
      font-size: 13px; font-family: var(--mono);
      background: var(--panel);
      border-right: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
      color: var(--text);
    }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .8; }
    .shortcuts {
      display: flex; align-items: center; gap: 12px;
      margin-left: auto; padding: 0 16px;
      font-size: 11px; color: var(--muted);
    }
    .shortcuts kbd {
      display: inline-block;
      background: var(--panel); border: 1px solid var(--border);
      border-bottom-width: 2px; border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--mono); font-size: 10px; color: var(--text);
    }

    .editor-wrapper { flex: 1; position: relative; overflow: hidden; }

    #editor {
      width: 100%; height: 100%;
      background: var(--bg); color: var(--text);
      border: none; outline: none; resize: none;
      font-family: var(--mono); font-size: 14px; line-height: 1.65;
      padding: 16px 20px;
      caret-color: #aeafad; tab-size: 2; overflow: auto;
    }
    #editor::selection { background: var(--selection); }

    /* ── Autocomplete dropdown ────────────────────────────────────────────────── */
    #autocomplete {
      position: fixed; z-index: 200;
      background: var(--dropdown-bg);
      border: 1px solid #555; border-radius: 4px;
      box-shadow: 0 6px 28px rgba(0,0,0,.55);
      min-width: 260px; max-width: 420px; max-height: 260px;
      display: flex; flex-direction: column;
      font-family: var(--mono); font-size: 13px;
      overflow: hidden;
    }
    #autocomplete.hidden { display: none; }

    #completion-list { overflow-y: auto; flex: 1; }

    .c-item {
      display: flex; align-items: center;
      padding: 3px 10px 3px 8px; gap: 7px;
      cursor: pointer; user-select: none;
    }
    .c-item:hover    { background: var(--dropdown-hover); }
    .c-item.selected { background: var(--dropdown-sel); }

    .c-icon {
      flex-shrink: 0; width: 18px; height: 18px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .c-icon.fn  { background: #dcdcaa22; color: var(--fn-col); }
    .c-icon.var { background: #9cdcfe22; color: var(--var-col); }

    .c-label  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .c-detail { flex-shrink: 0; font-size: 11px; color: var(--muted); }

    .c-footer {
      flex-shrink: 0; padding: 3px 10px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
      font-family: -apple-system, sans-serif;
    }

    /* ── Docs pane ────────────────────────────────────────────────────────────── */
    .docs-pane {
      width: 300px; flex-shrink: 0;
      background: var(--panel); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .docs-header {
      flex-shrink: 0; padding: 7px 14px;
      font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    #docs-body {
      flex: 1; overflow-y: auto;
      padding: 12px 14px; font-size: 13px; line-height: 1.6;
    }
    #docs-body .placeholder { color: var(--muted); font-style: italic; }
    #docs-body pre {
      background: var(--code-bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 10px; margin: 8px 0; overflow-x: auto;
      font-family: var(--mono); font-size: 12px; color: var(--fn-col);
    }
    #docs-body code {
      font-family: var(--mono); font-size: 12px;
      background: var(--code-bg); padding: 1px 4px; border-radius: 2px; color: var(--var-col);
    }
    #docs-body p      { margin: 6px 0; }
    #docs-body ul     { margin: 6px 0; padding-left: 16px; }
    #docs-body li     { margin: 3px 0; }
    #docs-body strong { color: #c586c0; }

    /* ── Status bar ───────────────────────────────────────────────────────────── */
    .statusbar {
      flex-shrink: 0; background: var(--accent);
      color: rgba(255,255,255,.9); padding: 2px 14px;
      font-size: 12px; display: flex; align-items: center; gap: 18px;
    }
    #status-count { margin-left: auto; }

    /* ── Scrollbars ───────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }
  </style>
</head>
<body>

<header>
  <h1>xq-lsp</h1>
  <span class="sep">—</span>
  <span class="sub">XQuery Language Server · Autocomplete Demo</span>
</header>

<main>
  <div class="editor-pane">
    <div class="tab-bar">
      <div class="tab"><span class="tab-dot"></span>demo.xq</div>
      <div class="shortcuts">
        <span><kbd>Ctrl</kbd>+<kbd>Space</kbd> trigger</span>
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>↵</kbd> or <kbd>Tab</kbd> insert</span>
        <span><kbd>Esc</kbd> dismiss</span>
      </div>
    </div>
    <div class="editor-wrapper">
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      <div id="autocomplete" class="hidden">
        <div id="completion-list"></div>
        <div class="c-footer" id="c-footer"></div>
      </div>
    </div>
  </div>

  <div class="docs-pane">
    <div class="docs-header">Documentation</div>
    <div id="docs-body"><p class="placeholder">Select a completion to see docs.</p></div>
  </div>
</main>

<div class="statusbar">
  <span id="status-pos">Ln 1, Col 1</span>
  <span>XQuery 3.1</span>
  <span id="status-count"></span>
</div>

<script src="xq-lsp.bundle.js"></script>
<script>
// ── Sample ────────────────────────────────────────────────────────────────────
const SAMPLE = `module namespace demo = "http://example.com/demo";

declare variable $demo:max-items := 100;
declare variable $demo:separator := ", ";

(:~
 : Greets a person by name.
 : @param $name  The person's name
 : @param $upper Whether to uppercase the result
 : @return       Greeting string
 :)
declare function demo:greet($name as xs:string, $upper as xs:boolean) as xs:string {
  let $msg := fn:concat("Hello, ", $name, "!")
  return if ($upper) then fn:upper-case($msg) else $msg
};

(:~
 : Greets each name in a sequence and joins the results.
 : @param $names  Sequence of name strings
 : @return        All greetings joined with the module separator
 :)
declare function demo:greet-all($names as xs:string*) as xs:string {
  let $greetings := for $n in $names
    return demo:greet($n, false())
  return fn:string-join($greetings, $demo:separator)
};

(: ── Try typing below! ─────────────────────────────────────────────────────
   fn:        → built-in XQuery/XPath functions (string, sequence, math…)
   math:      → math:sin, math:cos, math:log, math:pow, …
   $          → variables in scope
   demo:      → functions declared in this module
   Ctrl+Space → trigger completions anywhere
   ─────────────────────────────────────────────────────────────────────────── :)

demo:greet-all(("Alice", "Bob", "Carol"))
`;

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderMarkdown(md) {
  if (!md) return '';
  md = md.replace(/```[^\n]*\n([\s\S]*?)```/g, (_, c) => `<pre>${esc(c.trim())}</pre>`);
  md = md.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
  md = md.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return md.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<pre>')) return p;
    if (/^[-•]/.test(p) || p.includes('\n- ')) {
      return '<ul>' + p.replace(/^[-•] ?/, '').split(/\n[-•] ?/).map(i => `<li>${i.trim()}</li>`).join('') + '</ul>';
    }
    return `<p>${p}</p>`;
  }).join('');
}

// Pixel coordinates of the caret in a textarea via a mirror div.
function caretCoords(el, pos) {
  const m = document.createElement('div');
  const cs = getComputedStyle(el);
  Object.assign(m.style, {
    position: 'absolute', visibility: 'hidden', overflow: 'hidden',
    top: '0', left: '0', whiteSpace: 'pre-wrap', wordWrap: 'break-word',
    width: el.offsetWidth + 'px',
  });
  for (const p of ['paddingTop','paddingRight','paddingBottom','paddingLeft',
      'borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth',
      'fontSize','fontFamily','fontWeight','fontStyle','lineHeight',
      'letterSpacing','wordSpacing','boxSizing']) {
    m.style[p] = cs[p];
  }
  m.textContent = el.value.slice(0, pos);
  const span = document.createElement('span');
  span.textContent = '​'; // zero-width space
  m.appendChild(span);
  document.body.appendChild(m);
  const elR = el.getBoundingClientRect(), mR = m.getBoundingClientRect(), spR = span.getBoundingClientRect();
  const r = {
    top:  elR.top  + (spR.top  - mR.top)  - el.scrollTop  + parseFloat(cs.lineHeight),
    left: elR.left + (spR.left - mR.left) - el.scrollLeft,
  };
  document.body.removeChild(m);
  return r;
}

// Start of the current token (determines what gets replaced on insertion).
function replaceStart(text, offset) {
  const before = text.slice(0, offset);
  let m;
  if ((m = before.match(/\$[\w:\-]*$/)))       return offset - m[0].length; // $var
  if ((m = before.match(/[\w\-]+:([\w\-]*)$/))) return offset - m[1].length; // ns:local → replace local only
  if ((m = before.match(/[\w\-]+$/)))           return offset - m[0].length; // plain word
  return offset;
}

function stripSnippets(s) {
  return s.replace(/\$\{\d+:([^}]*)\}/g, '$1');
}

// ── LSP completion call (synchronous, in-browser) ─────────────────────────────

const BUILTINS = xqlsp.getBuiltins(); // compute once

function getItems(text, offset) {
  const analysis = xqlsp.analyze(text, 'demo://demo.xq');
  return xqlsp.getCompletions(
    { textBeforeCursor: text.slice(0, offset), cursorOffset: offset },
    analysis,
    new Map([['builtin:', BUILTINS]]),
    false,
  );
}

// ── State ─────────────────────────────────────────────────────────────────────

let items = [], selIdx = 0, open = false, debounce = null;

const editor  = document.getElementById('editor');
const ac      = document.getElementById('autocomplete');
const cList   = document.getElementById('completion-list');
const cFooter = document.getElementById('c-footer');
const docsEl  = document.getElementById('docs-body');
const posEl   = document.getElementById('status-pos');
const countEl = document.getElementById('status-count');

// ── Init ──────────────────────────────────────────────────────────────────────

editor.value = SAMPLE;
editor.selectionStart = editor.selectionEnd = SAMPLE.length;
editor.focus();
updatePos();

// ── Completions ───────────────────────────────────────────────────────────────

function triggerCompletion() {
  items  = getItems(editor.value, editor.selectionStart);
  selIdx = 0;
  if (items.length) showDropdown();
  else hideDropdown();
}

function scheduleCompletion(immediate) {
  clearTimeout(debounce);
  debounce = setTimeout(triggerCompletion, immediate ? 0 : 120);
}

// ── Render ────────────────────────────────────────────────────────────────────

const MAX = 60;

function renderDropdown() {
  cList.innerHTML = items.slice(0, MAX).map((it, i) => {
    const isVar = it.kind === 6;
    const sel   = i === selIdx ? ' selected' : '';
    return `<div class="c-item${sel}" data-i="${i}">` +
      `<span class="c-icon ${isVar ? 'var' : 'fn'}">${isVar ? '$' : 'ƒ'}</span>` +
      `<span class="c-label">${esc(it.label)}</span>` +
      (it.detail ? `<span class="c-detail">${esc(it.detail)}</span>` : '') +
      `</div>`;
  }).join('');
  const extra = items.length > MAX ? ` (${items.length} total — type to filter)` : '';
  cFooter.textContent = `${Math.min(items.length, MAX)} item${items.length === 1 ? '' : 's'}${extra}`;
  countEl.textContent = items.length ? `${items.length} completion${items.length === 1 ? '' : 's'}` : '';
  renderDocs();
}

function showDropdown() {
  const coords = caretCoords(editor, replaceStart(editor.value, editor.selectionStart));
  ac.style.top  = coords.top  + 'px';
  ac.style.left = coords.left + 'px';
  ac.classList.remove('hidden');
  open = true;
  renderDropdown();
  requestAnimationFrame(() => {
    const r = ac.getBoundingClientRect();
    if (r.right  > window.innerWidth  - 8) ac.style.left = (window.innerWidth  - r.width  - 8) + 'px';
    if (r.bottom > window.innerHeight - 8) {
      const lh = parseFloat(getComputedStyle(editor).lineHeight);
      ac.style.top = (coords.top - r.height - lh) + 'px';
    }
  });
  scrollSel();
}

function hideDropdown() {
  ac.classList.add('hidden');
  open = false;
  countEl.textContent = '';
}

function scrollSel() {
  cList.querySelector('.c-item.selected')?.scrollIntoView({ block: 'nearest' });
}

function renderDocs() {
  const it = items[selIdx];
  if (!it) { docsEl.innerHTML = '<p class="placeholder">Select a completion to see docs.</p>'; return; }
  const raw = it.documentation;
  const md  = raw ? (typeof raw === 'string' ? raw : raw.value) : (it.detail || it.label);
  docsEl.innerHTML = renderMarkdown(md);
}

// ── Insert ────────────────────────────────────────────────────────────────────

function insertSelected() {
  const it = items[selIdx];
  if (!it) return;
  const text  = editor.value, cur = editor.selectionStart;
  const start = replaceStart(text, cur);
  const ins   = stripSnippets(it.insertText ?? it.label);
  editor.value = text.slice(0, start) + ins + text.slice(cur);
  editor.selectionStart = editor.selectionEnd = start + ins.length;
  hideDropdown();
  editor.focus();
  updatePos();
}

// ── Keyboard ──────────────────────────────────────────────────────────────────

editor.addEventListener('keydown', e => {
  if (open) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); selIdx = Math.min(selIdx+1, Math.min(items.length, MAX)-1); renderDropdown(); scrollSel(); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); selIdx = Math.max(selIdx-1, 0);                             renderDropdown(); scrollSel(); return; }
    if (e.key === 'PageDown')   { e.preventDefault(); selIdx = Math.min(selIdx+10, Math.min(items.length, MAX)-1); renderDropdown(); scrollSel(); return; }
    if (e.key === 'PageUp')     { e.preventDefault(); selIdx = Math.max(selIdx-10, 0);                             renderDropdown(); scrollSel(); return; }
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); insertSelected(); return; }
    if (e.key === 'Escape')     { e.preventDefault(); hideDropdown(); return; }
  }
  if (e.key === ' ' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); scheduleCompletion(true); return; }
  if (e.key === 'Tab' && !open) {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
    updatePos();
  }
});

editor.addEventListener('input', () => {
  updatePos();
  const ch = editor.value[editor.selectionStart - 1];
  scheduleCompletion(ch === ':' || ch === '$');
});

editor.addEventListener('click',  () => { updatePos(); hideDropdown(); });
editor.addEventListener('keyup',  () =>  updatePos());

cList.addEventListener('mousedown', e => {
  e.preventDefault();
  const row = e.target.closest('.c-item');
  if (row) { selIdx = +row.dataset.i; insertSelected(); }
});

cList.addEventListener('mouseover', e => {
  const row = e.target.closest('.c-item');
  if (!row) return;
  const i = +row.dataset.i;
  if (i !== selIdx) {
    selIdx = i;
    cList.querySelectorAll('.c-item').forEach((el, j) => el.classList.toggle('selected', j === i));
    renderDocs();
  }
});

document.addEventListener('mousedown', e => {
  if (!ac.contains(e.target) && e.target !== editor) hideDropdown();
});

function updatePos() {
  const text = editor.value.slice(0, editor.selectionStart).split('\n');
  posEl.textContent = `Ln ${text.length}, Col ${text[text.length-1].length + 1}`;
}
</script>
</body>
</html>
